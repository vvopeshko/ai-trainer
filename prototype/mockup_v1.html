              <${ProgramMenuModal}
                program=${program}
                onClose=${() => setProgramMenuOpen(false)}
              />
            `}
          </div>
        `
      }

      // Меню "Изменить программу" (открывается с home)
      function ProgramMenuModal({ program, onClose }) {
        const items = [
          {
            key: 'edit',
            icon: 'dumbbell',
            label: 'Редактировать упражнения',
            note: 'Поменять упражнения по умолчанию для каждого дня',
          },
          {
            key: 'alternatives',
            icon: 'zap',
            label: 'Настроить альтернативы',
            note: 'Запасные варианты для занятого тренажёра',
          },
          {
            key: 'fork',
            icon: 'plus',
            label: 'Сохранить как свою',
            note: 'Сделать копию и редактировать без AI',
          },
          {
            key: 'switch',
            icon: 'chevronRight',
            label: 'Выбрать другую программу',
            note: 'Каталог готовых + свои сохранённые',
          },
          {
            key: 'regenerate',
            icon: 'flame',
            label: 'Пересобрать через AI',
            note: 'AI учтёт прогресс и пожелания',
          },
        ]
        return html`
          <div
            class="absolute inset-0 z-30 flex items-end justify-center"
            style=${{ background: 'rgba(0, 0, 0, 0.5)', backdropFilter: 'blur(8px)' }}
            onClick=${onClose}
          >
            <div
              class="bg-card border border-border rounded-t-3xl p-5 w-full fade-up"
              onClick=${(e) => e.stopPropagation()}
            >
              <div class="w-12 h-1 bg-cardAlt rounded-full mx-auto mb-4"></div>
              <div class="text-sm font-semibold">${program.name}</div>
              <div class="text-xs text-muted mt-0.5">
                ${program.description.split} · ${program.description.daysPerWeek} дн./нед
              </div>

              <div class="mt-4 space-y-1">
                ${items.map(
                  (it) => html`
                    <button
                      key=${it.key}
                      onClick=${onClose}
                      class="w-full flex items-start gap-3 px-3 py-3 rounded-xl active:bg-cardAlt transition-colors text-left"
                    >
                      <div
                        class="w-9 h-9 rounded-full bg-accent/15 text-accent flex items-center justify-center flex-shrink-0"
                      >
                        <${Icon} name=${it.icon} size=${15} />
                      </div>
                      <div class="flex-1 min-w-0">
                        <div class="text-sm font-medium">${it.label}</div>
                        <div class="text-[11px] text-muted mt-0.5">${it.note}</div>
                      </div>
                      <${Icon} name="chevronRight" size=${16} cls="text-subtle mt-1" />
                    </button>
                  `,
                )}
              </div>

              <button
                onClick=${onClose}
                class="mt-3 w-full h-11 rounded-xl text-sm text-muted"
              >
                Отмена
              </button>
            </div>
          </div>
        `
      }

      // Маленькая плашка статистики
      function StatTile({ value, label, color }) {
        const valueCls =
          color === 'accent'
            ? 'text-accent'
            : color === 'success'
              ? 'text-success'
              : 'text-white'
        return html`
          <div class="rounded-2xl bg-card border border-border p-3 text-center">
            <div class=${`text-base font-semibold leading-none ${valueCls}`}>${value}</div>
            <div class="text-[10px] text-subtle uppercase tracking-wider mt-1.5">${label}</div>
          </div>
        `
      }

      // ═══════════════════════════════════════════════════════════════
      // ЭКРАН: РЕЖИМ ТРЕНИРОВКИ
      // ═══════════════════════════════════════════════════════════════

      function WorkoutScreen({ onExit, onComplete }) {
        // Список упражнений тренировки — stateful, чтобы можно было свапать
        // на альтернативу прямо во время тренировки.
        const [exercises, setExercises] = useState(() => mockProgram.nextWorkout.exercises)

        // Состояние выполнения: массив массивов {weight, reps, completed}
        const [log, setLog] = useState(() =>
          mockProgram.nextWorkout.exercises.map((ex) =>
            Array.from({ length: ex.sets }, (_, i) => ({
              weight: ex.prev[i]?.weight ?? 0,
              reps: ex.prev[i]?.reps ?? 10,
              completed: false,
            })),
          ),
        )

        const [currentExIdx, setCurrentExIdx] = useState(0)
        // Таймер отдыха
        const [restSec, setRestSec] = useState(0)
        const [restActive, setRestActive] = useState(false)
        const [restTotal, setRestTotal] = useState(0)
        // Модалки
        const [confirmFinish, setConfirmFinish] = useState(false)
        const [menuOpen, setMenuOpen] = useState(false)
        const [replaceOpen, setReplaceOpen] = useState(false)
        const [supersetOpen, setSupersetOpen] = useState(false)
        const [altOpen, setAltOpen] = useState(false)
        // Superset-пара для текущего упражнения (mock: просто сохраняем id)
        const [supersetPair, setSupersetPair] = useState(null)

        // ─── Таймер тренировки ─────────────────────────────────────
        // Стартует при монтировании WorkoutScreen.
        // В проде стартовое время записывается в Workout.startedAt и
        // подгружается оттуда при возврате к незавершённой тренировке.
        const [workoutStart] = useState(() => Date.now())
        const [elapsedSec, setElapsedSec] = useState(0)
        useEffect(() => {
          const id = setInterval(() => {
            setElapsedSec(Math.floor((Date.now() - workoutStart) / 1000))
          }, 1000)
          return () => clearInterval(id)
        }, [workoutStart])

        const formatElapsed = (sec) => {
          const h = Math.floor(sec / 3600)
          const m = Math.floor((sec % 3600) / 60)
          const s = sec % 60
          if (h > 0) {
            return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`
          }
          return `${m}:${String(s).padStart(2, '0')}`
        }

        const currentEx = exercises[currentExIdx]
        const pairedEx = supersetPair !== null ? exercises[supersetPair] : null

        // ─── Flow sets: обычный режим или интерливинг A↔B в суперсете ───
        let flowSets = []
        if (pairedEx) {
          const maxSets = Math.max(currentEx.sets, pairedEx.sets)
          for (let i = 0; i < maxSets; i++) {
            if (i < currentEx.sets) {
              flowSets.push({
                exIdx: currentExIdx,
                setIdx: i,
                letter: 'A',
                exerciseName: currentEx.name,
                bodyweight: currentEx.bodyweight,
                set: log[currentExIdx][i],
              })
            }
            if (i < pairedEx.sets) {
              flowSets.push({
                exIdx: supersetPair,
                setIdx: i,
                letter: 'B',
                exerciseName: pairedEx.name,
                bodyweight: pairedEx.bodyweight,
                set: log[supersetPair][i],
              })
            }
          }
        } else {
          flowSets = log[currentExIdx].map((set, i) => ({
            exIdx: currentExIdx,
            setIdx: i,
            letter: undefined,
            exerciseName: undefined,
            bodyweight: currentEx.bodyweight,
            set,
          }))
        }

        const nextFlowIdx = flowSets.findIndex(({ set }) => !set.completed)
        const allSetsDone = nextFlowIdx === -1

        const totalSets = log.reduce((sum, arr) => sum + arr.length, 0)
        const doneSets = log.reduce((sum, arr) => sum + arr.filter((s) => s.completed).length, 0)
        const allDone = doneSets === totalSets

        // Tick таймера
        useEffect(() => {
          if (!restActive) return
          const id = setInterval(() => {
            setRestSec((s) => {
              if (s <= 1) {
                setRestActive(false)
                return 0
              }
              return s - 1
            })
          }, 1000)
          return () => clearInterval(id)
        }, [restActive])

        const updateSet = (exIdx, setIdx, patch) => {
          setLog((prev) => {
            const copy = prev.map((arr) => arr.map((s) => ({ ...s })))
            copy[exIdx][setIdx] = { ...copy[exIdx][setIdx], ...patch }
            return copy
          })
        }

        // В обычном режиме — таймер после каждого "Сделал".
        // В суперсете — только после подхода B (перед новым циклом A→B).
        const markFlowDone = (flow) => {
          updateSet(flow.exIdx, flow.setIdx, { completed: true })
          const startRest = !pairedEx || flow.letter === 'B'
          if (startRest) {
            const rest = exercises[flow.exIdx].restSec
            setRestTotal(rest)
            setRestSec(rest)
            setRestActive(true)
          }
        }

        const undoFlow = (flow) => {
          updateSet(flow.exIdx, flow.setIdx, { completed: false })
        }

        const addExtraSet = (exIdx) => {
          setLog((prev) => {
            const copy = prev.map((arr) => arr.map((s) => ({ ...s })))
            const last = copy[exIdx][copy[exIdx].length - 1]
            copy[exIdx].push({ weight: last.weight, reps: last.reps, completed: false })
            return copy
          })
        }

        // Свап текущего упражнения на альтернативу из его списка.
        // Альтернативы заранее настроены в программе (см. ALT_SWAPS).
        // Сценарий: тренажёр занят — переключаемся одним тапом, не дёргая AI.
        const swapToAlternative = (alt) => {
          // Сколько подходов в текущем упражнении уже сделано — стараемся
          // сохранить их количество, переписав значения под альтернативу.
          const currentSets = log[currentExIdx]
          const newSetCount = Math.max(currentSets.length, alt.lastSets.length)
          const newExercise = {
            id: alt.id,
            name: alt.name,
            muscles: alt.muscles,
            bodyweight: alt.bodyweight,
            sets: newSetCount,
            targetReps:
              alt.lastSets.length > 0
                ? `${Math.min(...alt.lastSets.map((s) => s.reps))}-${Math.max(...alt.lastSets.map((s) => s.reps))}`
                : '—',
            restSec: 90,
            prev: alt.lastSets,
            // У альтернативы в моке нет своих альтернатив — оставляем пустой массив.
            alternatives: [],
          }
          setExercises((prev) =>
            prev.map((e, i) => (i === currentExIdx ? newExercise : e)),
          )
          // Сбрасываем состояние подходов под новые prev-значения
          setLog((prev) =>
            prev.map((arr, i) => {
              if (i !== currentExIdx) return arr
              return Array.from({ length: newSetCount }, (_, j) => ({
                weight: alt.lastSets[j]?.weight ?? alt.lastSets[0]?.weight ?? 0,
                reps: alt.lastSets[j]?.reps ?? alt.lastSets[0]?.reps ?? 10,
                completed: false,
              }))
            }),
          )
        }

        // Показать модалку завершения, если все подходы сделаны
        useEffect(() => {
          if (allDone && !confirmFinish) {
            setTimeout(() => setConfirmFinish(true), 300)
          }
        }, [allDone])

        // Упражнения в очереди для списка "Далее".
        // В суперсете B-упражнение уже показано в объединённой карточке — скрываем.
        const upcomingExercises = exercises
          .map((ex, i) => ({ ex, i }))
          .filter(({ i }) => i > currentExIdx && i !== supersetPair)

        // Сделанные упражнения — аналогично.
        const doneExercises = exercises
          .map((ex, i) => ({ ex, i }))
          .filter(
            ({ i }) =>
              i !== currentExIdx &&
              i !== supersetPair &&
              log[i].every((s) => s.completed) &&
              log[i].length > 0,
          )

        return html`
          <div class="h-full flex flex-col overflow-hidden">
            <!-- Top bar — компактный, только навигация и название -->
            <div
              class="px-4 pt-6 pb-3 flex items-center justify-between"
            >
              <button
                onClick=${onExit}
                class="w-9 h-9 rounded-full bg-card flex items-center justify-center text-muted"
              >
                <${Icon} name="chevronLeft" size=${18} />
              </button>
              <div class="text-center min-w-0 flex-1 px-3">
                <div class="text-sm font-semibold truncate">
                  ${mockProgram.nextWorkout.name}
                </div>
              </div>
              <button
                class="w-9 h-9 rounded-full bg-card flex items-center justify-center text-muted"
                aria-label="Меню тренировки"
              >
                <${Icon} name="moreHorizontal" size=${18} />
              </button>
            </div>

            <!-- Workout timer + Завершить -->
            <div class="px-4 pb-3">
              <div
                class="rounded-2xl border border-border p-3 flex items-center gap-3"
                style=${{
                  background:
                    'linear-gradient(135deg, rgba(124, 92, 252, 0.10) 0%, rgba(52, 211, 153, 0.04) 100%)',
                }}
              >
                <div
                  class="w-10 h-10 rounded-xl bg-accent/15 flex items-center justify-center text-accent flex-shrink-0"
                >
                  <${Icon} name="clock" size=${18} />
                </div>
                <div class="min-w-0 flex-1">
                  <div class="text-2xl font-semibold font-mono tabular-nums leading-none">
                    ${formatElapsed(elapsedSec)}
                  </div>
                  <div class="text-[11px] text-muted mt-1">
                    Упр. ${currentExIdx + 1}/${exercises.length} · ${doneSets}/${totalSets} подх.
                  </div>
                </div>
                <button
                  onClick=${() => setConfirmFinish(true)}
                  class="h-10 px-4 rounded-xl bg-card border border-border text-xs font-medium text-muted active:scale-95 transition-transform flex items-center gap-1.5"
                >
                  <${Icon} name="check" size=${14} />
                  <span>Завершить</span>
                </button>
              </div>
            </div>

            <!-- Scrollable content -->
            <div class="flex-1 overflow-y-auto scroll-hide">
              <!-- Done exercises (свёрнутая полоска, если есть) -->
              ${doneExercises.length > 0 &&
              html`
                <div class="px-5 pt-3">
                  <div class="text-xs uppercase tracking-wider text-subtle mb-2">Сделано</div>
                  <div class="space-y-1.5">
                    ${doneExercises.map(
                      ({ ex, i }) => html`
                        <button
                          key=${ex.id}
                          onClick=${() => {
                            setSupersetPair(null)
                            setCurrentExIdx(i)
                          }}
                          class="w-full flex items-center gap-2.5 px-3 py-2 rounded-xl bg-success/5 border border-success/15 text-sm text-muted"
                        >
                          <div
                            class="w-6 h-6 rounded-full bg-success/20 text-success flex items-center justify-center flex-shrink-0"
                          >
                            <${Icon} name="check" size=${12} />
                          </div>
                          <span class="truncate flex-1 text-left">${ex.name}</span>
                          <span class="text-xs text-subtle">
                            ${log[i].map((s) => (ex.bodyweight ? `×${s.reps}` : `${s.weight}×${s.reps}`)).join(' · ')}
                          </span>
                        </button>
                      `,
                    )}
                  </div>
                </div>
              `}

              <!-- Current exercise -->
              <div class="px-5 pt-5 fade-up" key=${`${currentExIdx}_${supersetPair}`}>
                ${pairedEx
                  ? html`
                      <!-- Заголовок: суперсет-пара -->
                      <div class="flex items-start justify-between">
                        <div class="flex-1 min-w-0 pr-3">
                          <div
                            class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-accent/15 text-accent text-[11px] font-bold uppercase tracking-wider"
                          >
                            <${Icon} name="zap" size=${11} />
                            <span>Суперсет</span>
                          </div>
                          <div class="mt-3 p-3 rounded-2xl bg-card border border-border">
                            <div class="flex items-center gap-2.5">
                              <div
                                class="w-7 h-7 rounded-full bg-accent text-white flex items-center justify-center text-xs font-bold flex-shrink-0"
                              >
                                A
                              </div>
                              <div class="min-w-0 flex-1">
                                <div class="text-sm font-semibold truncate">${currentEx.name}</div>
                                <div class="text-xs text-muted truncate">
                                  ${currentEx.sets}×${currentEx.targetReps} · ${currentEx.muscles}
                                </div>
                              </div>
                            </div>
                            <div class="border-l-2 border-dashed border-accent/40 ml-[13px] h-3 my-1"></div>
                            <div class="flex items-center gap-2.5">
                              <div
                                class="w-7 h-7 rounded-full bg-success text-white flex items-center justify-center text-xs font-bold flex-shrink-0"
                              >
                                B
                              </div>
                              <div class="min-w-0 flex-1">
                                <div class="text-sm font-semibold truncate">${pairedEx.name}</div>
                                <div class="text-xs text-muted truncate">
                                  ${pairedEx.sets}×${pairedEx.targetReps} · ${pairedEx.muscles}
                                </div>
                              </div>
                            </div>
                          </div>
                        </div>
                        <button
                          onClick=${() => setMenuOpen(true)}
                          class="w-10 h-10 rounded-full bg-card border border-border flex items-center justify-center text-muted flex-shrink-0"
                        >
                          <${Icon} name="moreHorizontal" size=${18} />
                        </button>
                      </div>
                      <div class="text-[11px] text-subtle mt-2 leading-relaxed">
                        Подходы чередуются: A → B → отдых → A → B → отдых
                      </div>
                    `
                  : html`
                      <!-- Заголовок: обычное упражнение -->
                      <div class="flex items-start justify-between">
                        <div class="flex-1 min-w-0 pr-3">
                          <div class="text-xs uppercase tracking-wider text-subtle">сейчас</div>
                          <div class="text-2xl font-semibold mt-1 leading-tight">${currentEx.name}</div>
                          <div class="text-sm text-muted mt-1">
                            ${currentEx.muscles} · ${currentEx.sets}×${currentEx.targetReps}
                          </div>
                          ${currentEx.alternatives && currentEx.alternatives.length > 0 &&
                          html`
                            <button
                              onClick=${() => setAltOpen(true)}
                              class="inline-flex items-center gap-1.5 mt-2 px-2.5 py-1 rounded-full bg-cardAlt border border-border text-[11px] text-muted active:scale-95 transition-transform"
                              title="Альтернативные упражнения"
                            >
                              <${Icon} name="zap" size=${11} />
                              <span>${currentEx.alternatives.length} альтернатив${currentEx.alternatives.length === 1 ? 'а' : ''}</span>
                            </button>
                          `}
                        </div>
                        <button
                          onClick=${() => setMenuOpen(true)}
                          class="w-10 h-10 rounded-full bg-card border border-border flex items-center justify-center text-muted flex-shrink-0"
                        >
                          <${Icon} name="moreHorizontal" size=${18} />
                        </button>
                      </div>

                      <!-- Recommendation + previous session (объединённая карточка) -->
                      ${currentEx.recommendation &&
                      html`
                        <${RecommendationCard}
                          rec=${currentEx.recommendation}
                          prev=${currentEx.prev}
                          bodyweight=${currentEx.bodyweight}
                        />
                      `}
                    `}

                <!-- Sets list (flowSets: обычно или интерливинг в суперсете) -->
                <div class="mt-5 space-y-3">
                  ${flowSets.map((flow, fIdx) => {
                    const isNext = fIdx === nextFlowIdx
                    const isDone = flow.set.completed
                    return html`
                      <${SetCard}
                        key=${`${flow.exIdx}_${flow.setIdx}`}
                        setIdx=${flow.setIdx}
                        set=${flow.set}
                        bodyweight=${flow.bodyweight}
                        isNext=${isNext}
                        isDone=${isDone}
                        letter=${flow.letter}
                        exerciseName=${flow.exerciseName}
                        onUpdate=${(patch) => updateSet(flow.exIdx, flow.setIdx, patch)}
                        onDone=${() => markFlowDone(flow)}
                        onUndo=${() => undoFlow(flow)}
                      />
                    `
                  })}
                </div>

                <!-- + подход / след. упражнение -->
                <div class="mt-4 space-y-2">
                  ${!pairedEx &&
                  html`
                    <button
                      onClick=${() => addExtraSet(currentExIdx)}
                      class="w-full h-11 rounded-xl bg-card border border-border text-sm text-muted flex items-center justify-center gap-1.5 active:scale-[0.99] transition-transform"
                    >
                      <${Icon} name="plus" size=${14} />
                      <span>Добавить подход</span>
                    </button>
                  `}
                  ${allSetsDone &&
                  currentExIdx < exercises.length - 1 &&
                  html`
                    <button
                      onClick=${() => {
                        // при переходе дальше сбрасываем суперсет и
                        // перепрыгиваем через B-упражнение, если оно было в паре
                        let nextIdx = currentExIdx + 1
                        if (supersetPair !== null && nextIdx === supersetPair) nextIdx += 1
                        setSupersetPair(null)
                        setCurrentExIdx(Math.min(exercises.length - 1, nextIdx))
                      }}
                      class="w-full h-13 rounded-2xl bg-accent text-white font-semibold flex items-center justify-center gap-2"
                      style=${{ height: '52px' }}
                    >
                      <span>К следующему упражнению</span>
                      <${Icon} name="chevronRight" size=${18} />
                    </button>
                  `}
                </div>
              </div>

              <!-- Далее: список остальных упражнений -->
              ${upcomingExercises.length > 0 &&
              html`
                <div class="px-5 pt-6 pb-6">
                  <div class="text-xs uppercase tracking-wider text-subtle mb-3">Далее</div>
                  <div class="space-y-2">
                    ${upcomingExercises.map(
                      ({ ex, i }) => html`
                        <button
                          key=${ex.id}
                          onClick=${() => {
                            setSupersetPair(null)
                            setCurrentExIdx(i)
                          }}
                          class="w-full flex items-center gap-3 p-3 rounded-2xl bg-card border border-border active:bg-cardAlt transition-colors text-left"
                        >
                          <div
                            class="w-9 h-9 rounded-full bg-cardAlt flex items-center justify-center text-xs text-muted font-medium flex-shrink-0"
                          >
                            ${i + 1}
                          </div>
                          <div class="flex-1 min-w-0">
                            <div class="text-sm font-medium truncate">${ex.name}</div>
                            <div class="text-xs text-muted truncate">
                              ${ex.sets}×${ex.targetReps} · ${ex.muscles}
                            </div>
                          </div>
                          <${Icon} name="chevronRight" size=${18} cls="text-subtle flex-shrink-0" />
                        </button>
                      `,
                    )}
                  </div>
                </div>
              `}

              <!-- Secondary actions -->
              <div class="px-5 pb-28">
                <div class="grid grid-cols-2 gap-2">
                  <button
                    class="h-11 rounded-xl bg-card border border-border text-xs text-muted flex items-center justify-center gap-1.5"
                  >
                    <${Icon} name="messageCircle" size=${14} />
                    <span>Спросить тренера</span>
                  </button>
                  <button
                    class="h-11 rounded-xl bg-card border border-border text-xs text-muted flex items-center justify-center gap-1.5"
                  >
                    <${Icon} name="camera" size=${14} />
                    <span>Фото тренажёра</span>
                  </button>
                </div>
              </div>
            </div>

            <!-- Rest timer overlay -->
            ${restActive &&
            html`
              <${RestTimer}
                sec=${restSec}
                total=${restTotal}
                onSkip=${() => {
                  setRestActive(false)
                  setRestSec(0)
                }}
              />
            `}

            <!-- Finish confirmation -->
            ${confirmFinish &&
            html`
              <${FinishModal}
                allDone=${allDone}
                onFinish=${() => {
                  setConfirmFinish(false)
                  onComplete()
                }}
                onKeep=${() => setConfirmFinish(false)}
              />
            `}

            <!-- Context menu на упражнении -->
            ${menuOpen &&
            html`
              <${ExerciseMenuModal}
                onClose=${() => setMenuOpen(false)}
                onReplace=${() => {
                  setMenuOpen(false)
                  setReplaceOpen(true)
                }}
                onSuperset=${() => {
                  setMenuOpen(false)
                  setSupersetOpen(true)
                }}
                onSkip=${() => {
                  // помечаем все подходы текущего упражнения как отменённые, двигаемся дальше
                  setMenuOpen(false)
                  if (currentExIdx < exercises.length - 1) {
                    setCurrentExIdx((i) => i + 1)
                  }
                }}
                supersetActive=${supersetPair !== null}
                onUnsuperset=${() => {
                  setMenuOpen(false)
                  setSupersetPair(null)
                }}
              />
            `}
            ${replaceOpen &&
            html`
              <${ReplaceExerciseModal}
                exercise=${currentEx}
                onClose=${() => setReplaceOpen(false)}
                onPick=${() => setReplaceOpen(false)}
              />
            `}
            ${supersetOpen &&
            html`
              <${SupersetModal}
                exercises=${exercises}
                currentIdx=${currentExIdx}
                onClose=${() => setSupersetOpen(false)}
                onPick=${(idx) => {
                  setSupersetPair(idx)
                  setSupersetOpen(false)
                }}
              />
            `}
            ${altOpen &&
            html`
              <${AlternativesModal}
                currentEx=${currentEx}
                onClose=${() => setAltOpen(false)}
                onPick=${(alt) => {
                  swapToAlternative(alt)
                  setAltOpen(false)
                }}
              />
            `}
          </div>
        `
      }

      // ═══════════════════════════════════════════════════════════════
      // КАРТОЧКА ПОДХОДА
      // v2: широкая кнопка "Готово" снизу
      // v3: опциональный маркер упражнения в суперсете (A/B + имя)
      // ═══════════════════════════════════════════════════════════════

      function SetCard({
        setIdx,
        set,
        bodyweight,
        isNext,
        isDone,
        onUpdate,
        onDone,
        onUndo,
        letter, // 'A' | 'B' | undefined
        exerciseName, // string | undefined
      }) {
        const letterColor =
          letter === 'A' ? 'bg-accent text-white' : letter === 'B' ? 'bg-success text-white' : null

        // Бейдж: либо "A2" / "B2" (в суперсете), либо просто "2" (обычный режим)
        const BadgeContent = letter ? html`<span>${letter}${setIdx + 1}</span>` : `${setIdx + 1}`

        // Три состояния: done, next (active), future (dimmed)
        if (isDone) {
          return html`
            <div
              class="flex items-center gap-3 px-4 py-3 rounded-2xl bg-success/5 border border-success/20"
            >
              <div
                class=${`flex-shrink-0 h-8 min-w-8 px-2 rounded-full flex items-center justify-center text-[11px] font-bold font-mono ${
                  letter ? letterColor : 'bg-success text-white'
                }`}
              >
                ${letter ? BadgeContent : html`<${Icon} name="check" size=${14} />`}
              </div>
              <div class="flex-1 min-w-0">
                ${exerciseName
                  ? html`
                      <div class="text-[11px] text-subtle truncate">${exerciseName}</div>
                      <div class="text-sm font-mono tabular-nums font-medium">
                        ${bodyweight ? `×${set.reps}` : `${set.weight} кг × ${set.reps}`}
                      </div>
                    `
                  : html`
                      <div class="text-xs text-subtle uppercase tracking-wider">
                        подход ${setIdx + 1}
                      </div>
                      <div class="text-base font-mono tabular-nums font-medium mt-0.5">
                        ${bodyweight ? `×${set.reps}` : `${set.weight} кг × ${set.reps}`}
                      </div>
                    `}
              </div>
              <button
                onClick=${onUndo}
                class="w-9 h-9 rounded-full bg-cardAlt/60 flex items-center justify-center text-muted active:scale-95 transition-transform"
                aria-label="Отменить подход"
                title="Отменить подход"
              >
                <${Icon} name="x" size=${15} />
              </button>
            </div>
          `
        }

        if (!isNext) {
          return html`
            <div
              class="flex items-center gap-3 px-4 py-3 rounded-2xl bg-card border border-border opacity-50"
            >
              <div
                class=${`flex-shrink-0 h-8 min-w-8 px-2 rounded-full flex items-center justify-center text-[11px] font-bold font-mono ${
                  letter ? letterColor + ' opacity-70' : 'bg-cardAlt text-muted'
                }`}
              >
                ${BadgeContent}
              </div>
              <div class="flex-1 min-w-0">
                ${exerciseName &&
                html`<div class="text-[11px] text-subtle truncate">${exerciseName}</div>`}
                <div class="text-sm text-muted font-mono">
                  ${bodyweight ? `×${set.reps}` : `${set.weight} кг × ${set.reps}`}
                </div>
              </div>
            </div>
          `
        }

        // Активный подход — большая карточка с степперами и широкой кнопкой
        return html`
          <div
            class="rounded-3xl border border-accent/40 bg-accent/5 p-4 shadow-[0_0_24px_-8px_rgba(124,92,252,0.4)]"
          >
            <div class="flex items-center gap-2.5 mb-3">
              <div
                class=${`flex-shrink-0 h-8 min-w-8 px-2 rounded-full flex items-center justify-center text-[11px] font-bold font-mono ${
                  letter ? letterColor : 'bg-accent text-white'
                }`}
              >
                ${BadgeContent}
              </div>
              <div class="min-w-0 flex-1">
                <div class="text-xs uppercase tracking-wider text-accent font-medium">
                  Текущий подход
                </div>
                ${exerciseName &&
                html`<div class="text-sm font-medium truncate text-white mt-0.5">
                  ${exerciseName}
                </div>`}
              </div>
            </div>

            <div class=${`grid gap-3 ${bodyweight ? '' : 'grid-cols-2'}`}>
              ${!bodyweight &&
              html`
                <${BigStepper}
                  label="Вес, кг"
                  value=${set.weight}
                  step=${2.5}
                  onChange=${(v) => onUpdate({ weight: v })}
                />
              `}
              <${BigStepper}
                label="Повторы"
                value=${set.reps}
                step=${1}
                onChange=${(v) => onUpdate({ reps: v })}
              />
            </div>

            <button
              onClick=${onDone}
              class="mt-4 w-full rounded-2xl bg-accent text-white font-semibold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform shadow-[0_6px_20px_-8px_rgba(124,92,252,0.8)]"
              style=${{ height: '56px' }}
            >
              <${Icon} name="check" size=${22} />
              <span class="text-base">
                Сделал · ${bodyweight ? `×${set.reps}` : `${set.weight} × ${set.reps}`}
              </span>
            </button>
          </div>
        `
      }

      // ═══════════════════════════════════════════════════════════════
      // Карточка с рекомендацией + прошлой тренировкой
      // ═══════════════════════════════════════════════════════════════

      function RecommendationCard({ rec, prev, bodyweight }) {
        // Цветовое выделение по тону рекомендации
        const toneCls =
          rec.tone === 'progress'
            ? 'border-success/30 bg-success/5'
            : rec.tone === 'plateau'
              ? 'border-accent/30 bg-accent/5'
              : rec.tone === 'regression'
                ? 'border-orange-400/30 bg-orange-400/5'
                : 'border-border bg-card'
        const labelCls =
          rec.tone === 'progress'
            ? 'text-success'
            : rec.tone === 'plateau'
              ? 'text-accent'
              : rec.tone === 'regression'
                ? 'text-orange-400'
                : 'text-muted'

        return html`
          <div class=${`mt-4 rounded-2xl border p-4 ${toneCls}`}>
            <div class="flex items-center gap-2">
              <span class="text-base">${rec.emoji}</span>
              <div
                class=${`text-[10px] uppercase tracking-wider font-medium ${labelCls}`}
              >
                Рекомендация тренера
              </div>
            </div>
            <div class="mt-2 text-sm font-semibold">${rec.title}</div>
            <div class="mt-1 text-[13px] leading-relaxed text-muted">${rec.body}</div>
            ${prev &&
            prev.length > 0 &&
            html`
              <div class="mt-3 pt-3 border-t border-white/5">
                <div class="text-[10px] uppercase tracking-wider text-subtle">
                  Прошлая тренировка
                </div>
                <div class="text-sm font-mono tabular-nums mt-1 text-muted">
                  ${prev
                    .map((s) => (bodyweight ? `×${s.reps}` : `${s.weight}×${s.reps}`))
                    .join('  ·  ')}
                </div>
              </div>
            `}
          </div>
        `
      }

      // ═══════════════════════════════════════════════════════════════
      // Крупный stepper для активного подхода
      // ═══════════════════════════════════════════════════════════════

      function BigStepper({ label, value, step, onChange }) {
        return html`
          <div class="rounded-2xl bg-card p-3">
            <div class="text-[10px] uppercase tracking-wider text-subtle text-center mb-1.5">
              ${label}
            </div>
            <div class="flex items-center justify-between gap-2">
              <button
                onClick=${() => onChange(Math.max(0, value - step))}
                class="stepper-btn w-10 h-10 rounded-full bg-cardAlt flex items-center justify-center text-muted flex-shrink-0"
              >
                <${Icon} name="minus" size=${16} />
              </button>
              <div class="text-2xl font-semibold font-mono tabular-nums leading-none">
                ${value}
              </div>
              <button
                onClick=${() => onChange(value + step)}
                class="stepper-btn w-10 h-10 rounded-full bg-cardAlt flex items-center justify-center text-muted flex-shrink-0"
              >
                <${Icon} name="plus" size=${16} />
              </button>
            </div>
          </div>
        `
      }

      // ═══════════════════════════════════════════════════════════════
      // Меню упражнения (⋯)
      // ═══════════════════════════════════════════════════════════════

      function ExerciseMenuModal({ onClose, onReplace, onSuperset, onSkip, supersetActive, onUnsuperset }) {
        const items = [
          { key: 'replace', label: 'Заменить на похожее', icon: 'zap', onClick: onReplace },
          supersetActive
            ? { key: 'unsuperset', label: 'Убрать суперсет', icon: 'x', onClick: onUnsuperset }
            : { key: 'superset', label: 'Объединить в суперсет', icon: 'zap', onClick: onSuperset },
          { key: 'skip', label: 'Пропустить упражнение', icon: 'skipForward', onClick: onSkip, danger: true },
        ]
        return html`
          <div
            class="absolute inset-0 z-30 flex items-end justify-center"
            style=${{ background: 'rgba(0, 0, 0, 0.5)', backdropFilter: 'blur(8px)' }}
            onClick=${onClose}
          >
            <div
              class="bg-card border border-border rounded-t-3xl p-4 w-full fade-up"
              onClick=${(e) => e.stopPropagation()}
            >
              <div class="w-12 h-1 bg-cardAlt rounded-full mx-auto mb-4"></div>
              <div class="space-y-1">
                ${items.map(
                  (it) => html`
                    <button
                      key=${it.key}
                      onClick=${it.onClick}
                      class=${`w-full flex items-center gap-3 px-3 py-3.5 rounded-xl text-left active:bg-cardAlt transition-colors ${
                        it.danger ? 'text-red-400' : 'text-white'
                      }`}
                    >
                      <div
                        class=${`w-9 h-9 rounded-full flex items-center justify-center ${
                          it.danger ? 'bg-red-500/10 text-red-400' : 'bg-accent/15 text-accent'
                        }`}
                      >
                        <${Icon} name=${it.icon} size=${16} />
                      </div>
                      <span class="text-sm font-medium flex-1">${it.label}</span>
                    </button>
                  `,
                )}
                <button
                  onClick=${onClose}
                  class="w-full h-11 mt-2 rounded-xl text-sm text-muted"
                >
                  Отмена
                </button>
              </div>
            </div>
          </div>
        `
      }

      // ═══════════════════════════════════════════════════════════════
      // Модалка: заменить на похожее
      // ═══════════════════════════════════════════════════════════════

      function ReplaceExerciseModal({ exercise, onClose, onPick }) {
        const alternatives = [
          {
            name: 'Тяга гантели к поясу в наклоне',
            muscles: 'широчайшие, ромбовидные',
            match: 90,
          },
          { name: 'Тяга Т-грифа', muscles: 'широчайшие, ромбовидные', match: 85 },
          { name: 'Тяга нижнего блока', muscles: 'широчайшие', match: 75 },
        ]
        return html`
          <div
            class="absolute inset-0 z-30 flex items-end justify-center"
            style=${{ background: 'rgba(0, 0, 0, 0.5)', backdropFilter: 'blur(8px)' }}
            onClick=${onClose}
          >
            <div
              class="bg-card border border-border rounded-t-3xl p-5 w-full fade-up"
              onClick=${(e) => e.stopPropagation()}
            >
              <div class="w-12 h-1 bg-cardAlt rounded-full mx-auto mb-4"></div>
              <div class="text-sm font-semibold">Заменить упражнение</div>
              <div class="text-xs text-muted mt-0.5">
                Вместо <span class="text-white">${exercise.name}</span>
              </div>
              <div class="mt-4 space-y-2">
                ${alternatives.map(
                  (alt) => html`
                    <button
                      key=${alt.name}
                      onClick=${() => onPick(alt)}
                      class="w-full flex items-center gap-3 p-3 rounded-2xl bg-cardAlt border border-border active:bg-card transition-colors text-left"
                    >
                      <div
                        class="w-10 h-10 rounded-full bg-accent/15 flex items-center justify-center text-accent flex-shrink-0"
                      >
                        <${Icon} name="dumbbell" size=${16} />
                      </div>
                      <div class="flex-1 min-w-0">
                        <div class="text-sm font-medium truncate">${alt.name}</div>
                        <div class="text-xs text-muted truncate">${alt.muscles}</div>
                      </div>
                      <div
                        class="text-[10px] px-2 py-1 rounded-full bg-success/10 text-success font-medium flex-shrink-0"
                      >
                        ${alt.match}%
                      </div>
                    </button>
                  `,
                )}
              </div>
              <button onClick=${onClose} class="mt-3 w-full h-11 rounded-xl text-sm text-muted">
                Отмена
              </button>
            </div>
          </div>
        `
      }

      // ═══════════════════════════════════════════════════════════════
      // Модалка: суперсет (выбрать второе упражнение)
      // ═══════════════════════════════════════════════════════════════

      function SupersetModal({ exercises, currentIdx, onClose, onPick }) {
        return html`
          <div
            class="absolute inset-0 z-30 flex items-end justify-center"
            style=${{ background: 'rgba(0, 0, 0, 0.5)', backdropFilter: 'blur(8px)' }}
            onClick=${onClose}
          >
            <div
              class="bg-card border border-border rounded-t-3xl p-5 w-full fade-up"
              onClick=${(e) => e.stopPropagation()}
            >
              <div class="w-12 h-1 bg-cardAlt rounded-full mx-auto mb-4"></div>
              <div class="text-sm font-semibold">Объединить в суперсет</div>
              <div class="text-xs text-muted mt-0.5 leading-relaxed">
                Два упражнения будут чередоваться: подход первого → сразу подход второго → отдых.
                Выбери второе:
              </div>
              <div class="mt-4 space-y-2 max-h-80 overflow-y-auto">
                ${exercises.map((ex, i) => {
                  if (i === currentIdx) return null
                  return html`
                    <button
                      key=${ex.id}
                      onClick=${() => onPick(i)}
                      class="w-full flex items-center gap-3 p-3 rounded-2xl bg-cardAlt border border-border active:bg-card transition-colors text-left"
                    >
                      <div
                        class="w-9 h-9 rounded-full bg-cardAlt flex items-center justify-center text-xs text-muted font-medium flex-shrink-0"
                      >
                        ${i + 1}
                      </div>
                      <div class="flex-1 min-w-0">
                        <div class="text-sm font-medium truncate">${ex.name}</div>
                        <div class="text-xs text-muted truncate">
                          ${ex.sets}×${ex.targetReps} · ${ex.muscles}
                        </div>
                      </div>
                    </button>
                  `
                })}
              </div>
              <button onClick=${onClose} class="mt-3 w-full h-11 rounded-xl text-sm text-muted">
                Отмена
              </button>
            </div>
          </div>
        `
      }

      // ═══════════════════════════════════════════════════════════════
      // Модалка: альтернативы упражнения (precomputed swaps в программе)
      // Отличается от ReplaceExerciseModal тем, что список заранее настроен
      // в программе и не дёргает AI — мгновенный переход.
      // ═══════════════════════════════════════════════════════════════

      function AlternativesModal({ currentEx, onClose, onPick }) {
        const fmtSets = (sets, bw) =>
          sets
            .slice(0, 3)
            .map((s) => (bw ? `×${s.reps}` : `${s.weight}×${s.reps}`))
            .join(' · ')

        return html`
          <div
            class="absolute inset-0 z-30 flex items-end justify-center"
            style=${{ background: 'rgba(0, 0, 0, 0.5)', backdropFilter: 'blur(8px)' }}
            onClick=${onClose}
          >
            <div
              class="bg-card border border-border rounded-t-3xl p-5 w-full fade-up"
              onClick=${(e) => e.stopPropagation()}
            >
              <div class="w-12 h-1 bg-cardAlt rounded-full mx-auto mb-4"></div>
              <div class="text-sm font-semibold">Альтернативы</div>
              <div class="text-xs text-muted mt-0.5 leading-relaxed">
                Заранее настроенные варианты для этого упражнения. Полезно когда
                тренажёр занят или хочется разнообразия.
              </div>

              <!-- Текущее упражнение, не кликабельное -->
              <div class="mt-4 p-3 rounded-2xl bg-accent/10 border border-accent/30">
                <div class="flex items-center gap-3">
                  <div
                    class="w-9 h-9 rounded-full bg-accent text-white flex items-center justify-center flex-shrink-0"
                  >
                    <${Icon} name="check" size=${15} />
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="text-sm font-medium truncate">${currentEx.name}</div>
                    <div class="text-[11px] text-accent/80 truncate">текущее · ${currentEx.muscles}</div>
                  </div>
                </div>
              </div>

              <!-- Альтернативы -->
              <div class="mt-2 space-y-2 max-h-72 overflow-y-auto scroll-hide">
                ${(currentEx.alternatives || []).map(
                  (alt) => html`
                    <button
                      key=${alt.id}
                      onClick=${() => onPick(alt)}
                      class="w-full flex items-center gap-3 p-3 rounded-2xl bg-cardAlt border border-border active:bg-card transition-colors text-left"
                    >
                      <div
                        class="w-9 h-9 rounded-full bg-card flex items-center justify-center text-muted flex-shrink-0"
                      >
                        <${Icon} name="dumbbell" size=${15} />
                      </div>
                      <div class="flex-1 min-w-0">
                        <div class="text-sm font-medium truncate">${alt.name}</div>
                        <div class="text-[11px] text-muted truncate">
                          ${alt.muscles} · последняя ${fmtSets(alt.lastSets, alt.bodyweight)}
                        </div>
                      </div>
                      <${Icon} name="chevronRight" size=${16} cls="text-subtle flex-shrink-0" />
                    </button>
                  `,
                )}
              </div>
              <button onClick=${onClose} class="mt-3 w-full h-11 rounded-xl text-sm text-muted">
                Отмена
              </button>
            </div>
          </div>
        `
      }

      // ═══════════════════════════════════════════════════════════════
      // STEPPER
      // ═══════════════════════════════════════════════════════════════

      function NumberStepper({ label, value, step, onChange, disabled }) {
        return html`
          <div class="flex-1 flex items-center justify-center gap-2">
            <button
              onClick=${() => onChange(Math.max(0, value - step))}
              disabled=${disabled}
              class="stepper-btn w-8 h-8 rounded-full bg-cardAlt flex items-center justify-center text-muted disabled:opacity-30"
            >
              <${Icon} name="minus" size=${14} />
            </button>
            <div class="text-center min-w-[56px]">
              <div class="text-lg font-semibold font-mono tabular-nums leading-none">${value}</div>
              <div class="text-[10px] text-subtle uppercase tracking-wider mt-0.5">${label}</div>
            </div>
            <button
              onClick=${() => onChange(value + step)}
              disabled=${disabled}
              class="stepper-btn w-8 h-8 rounded-full bg-cardAlt flex items-center justify-center text-muted disabled:opacity-30"
            >
              <${Icon} name="plus" size=${14} />
            </button>
          </div>
        `
      }

      // ═══════════════════════════════════════════════════════════════
      // ТАЙМЕР ОТДЫХА
      // ═══════════════════════════════════════════════════════════════

      function RestTimer({ sec, total, onSkip }) {
        const pct = total > 0 ? (sec / total) * 100 : 0
        const mm = Math.floor(sec / 60)
        const ss = (sec % 60).toString().padStart(2, '0')
        return html`
          <div
            class="absolute inset-0 z-20 flex items-center justify-center"
            style=${{ background: 'rgba(15, 15, 19, 0.88)', backdropFilter: 'blur(14px)' }}
          >
            <div class="text-center px-8 fade-up">
              <div class="text-xs uppercase tracking-widest text-muted">Отдых</div>
              <div class="relative mt-6">
                <div class="absolute inset-0 rounded-full timer-pulse bg-accent/10"></div>
                <svg width="220" height="220" viewBox="0 0 100 100" class="-rotate-90">
                  <circle cx="50" cy="50" r="45" stroke="#1A1A24" stroke-width="5" fill="none" />
                  <circle
                    cx="50"
                    cy="50"
                    r="45"
                    stroke="#7C5CFC"
                    stroke-width="5"
                    fill="none"
                    stroke-linecap="round"
                    stroke-dasharray=${2 * Math.PI * 45}
                    stroke-dashoffset=${2 * Math.PI * 45 * (1 - pct / 100)}
                    style=${{ transition: 'stroke-dashoffset 1s linear' }}
                  />
                </svg>
                <div class="absolute inset-0 flex items-center justify-center">
                  <div>
                    <div class="text-5xl font-semibold font-mono tabular-nums">${mm}:${ss}</div>
                  </div>
                </div>
              </div>
              <button
                onClick=${onSkip}

      // Bar-chart тоннажа (SVG inline)
      function TonnageChart({ data }) {
        if (!data || !data.length)
          return html`<div class="text-xs text-subtle text-center py-4">Нет данных</div>`
        const W = 320
        const H = 120
        const padX = 4
        const padY = 12
        const maxT = Math.max(...data.map((d) => d.tonnageKg))
        const barW = (W - padX * 2) / data.length - 2
        const colors = {
          1: '#7C5CFC', // chest
          2: '#34D399', // back
          3: '#F59E0B', // legs
          4: '#EC4899', // shoulders
        }

        return html`
          <svg viewBox="0 0 ${W} ${H}" class="w-full h-32">
            ${data.map((d, i) => {
              const h = maxT > 0 ? ((H - padY * 2) * d.tonnageKg) / maxT : 0
              const x = padX + i * (barW + 2)
              const y = H - padY - h
              const color = colors[d.type] || '#7C5CFC'
              return html`
                <g key=${i}>
                  <rect
                    x=${x}
                    y=${y}
                    width=${barW}
                    height=${h}
                    rx="2"
                    fill=${color}
                    fill-opacity="0.7"
                  />
                </g>
              `
            })}
            <!-- Baseline -->
            <line
              x1="0"
              y1=${H - padY + 1}
              x2=${W}
              y2=${H - padY + 1}
              stroke="rgba(255,255,255,0.06)"
              stroke-width="1"
            />
          </svg>
          <!-- Легенда: подписи дней -->

              День 1
            </span>
            <span class="flex items-center gap-1">
              <span class="w-2 h-2 rounded-sm" style=${{ background: colors[2] }}></span>
              День 2
            </span>
            <span class="flex items-center gap-1">
              <span class="w-2 h-2 rounded-sm" style=${{ background: colors[3] }}></span>
              День 3
            </span>
            <span class="flex items-center gap-1">
              <span class="w-2 h-2 rounded-sm" style=${{ background: colors[4] }}></span>
              День 4
            </span>
          </div>
        `
      }

      // Строка прогресса упражнения с мини-line-чартом
      function ExerciseProgressRow({ ep }) {
        const W = 80
        const H = 28
        const sessions = ep.sessions
        const values = sessions.map((s) => (ep.bodyweight ? s.maxReps : s.maxW))
        const minV = Math.min(...values)
        const maxV = Math.max(...values)
        const range = maxV - minV || 1
        const points = sessions
          .map((s, i) => {
            const x = (i / Math.max(1, sessions.length - 1)) * W
            const v = ep.bodyweight ? s.maxReps : s.maxW
            const y = H - ((v - minV) / range) * (H - 4) - 2
            return `${x},${y}`
          })
          .join(' ')
        const trendUp = ep.delta > 0
        const trendColor = trendUp ? '#34D399' : ep.delta < 0 ? '#F87171' : 'rgba(255,255,255,0.4)'
        const unit = ep.bodyweight ? 'повт.' : 'кг'

        return html`
          <div class="flex items-center gap-3 p-3 rounded-2xl bg-card border border-border">
            <div class="flex-1 min-w-0">
              <div class="text-sm font-medium truncate">${ep.name}</div>
              <div class="text-[11px] text-muted">
                ${ep.from} → ${ep.to} ${unit} · ${ep.delta >= 0 ? '+' : ''}${ep.delta}
                ${ep.delta !== 0 ? ` (${ep.pct >= 0 ? '+' : ''}${ep.pct}%)` : ''}
              </div>
            </div>
            <svg
              viewBox="0 0 ${W} ${H}"
              class="w-20 h-7 flex-shrink-0"
              preserveAspectRatio="none"
            >
              <polyline
                points=${points}
                fill="none"
                stroke=${trendColor}
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
        `
      }

                data.overloadInsights.regression.length > 0) &&

                          class="flex items-center gap-3 px-3 py-2 rounded-xl bg-card border border-border"
                        >
                          <span class="text-sm">🏆</span>
                          <div class="flex-1 min-w-0">
                            <div class="text-sm truncate">${r.name}</div>
                            <div class="text-[11px] text-muted">
                              ${r.prevWeight} → ${r.weight} кг
                            </div>
                          </div>
                          <div class="text-success text-xs font-semibold tabular-nums">
                            +${r.delta}
                          </div>
                        </div>
                      `,
                    )}
                  </div>
                </div>
              `}
            </div>

            <${BottomNav} active="progress" onChange=${onNav} />
          </div>
        `
      }

      // Строка объёма группы мышц
      // Цвета только для текстового счётчика; визуал бара — отдельно (см. VolumeBar).
      const MUSCLE_COLORS = {
        none: { text: 'text-muted', dot: 'bg-white/20' },
        low: { text: 'text-orange-400', dot: 'bg-orange-400' },
        optimal: { text: 'text-success', dot: 'bg-success' },
        over: { text: 'text-yellow-400', dot: 'bg-yellow-400' },
        overload: { text: 'text-red-400', dot: 'bg-red-400' },
      }

      // Универсальный 3-сегментный бар, привязанный к смыслу:
      //   ● low     → короткая ОРАНЖЕВАЯ полоска (не дотянул до цели)
      //   ● optimal → серый "buildup" (0→min) + ЗЕЛЁНЫЙ "в зоне" (min→sets)
      //   ● overload→ серый buildup + ЗЕЛЁНАЯ полная зона + КРАСНЫЙ хвост (max→sets)
      // Сетка такая, что серая часть 0→min всегда одинакового веса,
      // а красный хвост виден ровно тем "лишним", что вышло за max.
      function VolumeBar({ sets, min, max, height = 'h-2' }) {
        const safeSets = Math.max(0, sets || 0)
        const safeMin = Math.max(0, min || 0)
        const safeMax = Math.max(safeMin, max || 0)
        // Шкала: всегда вмещает целевой диапазон + минимум 30% на overshoot
        const overflowAllowance = Math.max(2, Math.ceil(safeMax * 0.4))
        const scale = Math.max(safeSets, safeMax + overflowAllowance, safeMin + 1)
        const pct = (s) => (s / scale) * 100

        // Случай 1: ничего не сделано (или цель нулевая)
        if (safeSets <= 0) {
          return html`<div class=${`relative ${height} rounded-full bg-cardAlt`}></div>`
        }

        // Случай 2: low — не дотянул до min. Только оранжевый сегмент 0→sets.
        if (safeSets < safeMin) {
          return html`
            <div class=${`relative ${height} rounded-full bg-cardAlt overflow-hidden`}>
              <div
                class="absolute inset-y-0 left-0 bg-orange-400 rounded-full"
                style=${{ width: `${pct(safeSets)}%` }}
              ></div>
              <!-- Тонкий тик там, где должна быть min — чтобы видеть, докуда не достал -->
              <div
                class="absolute inset-y-0 w-px bg-white/30"
                style=${{ left: `${pct(safeMin)}%` }}
              ></div>
            </div>
          `
        }

        // Случай 3: optimal или overload. Серый buildup + зелёная зона + (опц.) красный хвост.
        const greyW = pct(safeMin)
        const greenL = pct(safeMin)
        const greenEnd = Math.min(safeSets, safeMax)
        const greenW = pct(greenEnd - safeMin)
        const redL = pct(safeMax)
        const redW = safeSets > safeMax ? pct(safeSets - safeMax) : 0

        return html`
          <div class=${`relative ${height} rounded-full bg-cardAlt overflow-hidden`}>
            <!-- buildup до min: серый -->
            <div
              class="absolute inset-y-0 bg-white/25"
              style=${{ left: 0, width: `${greyW}%` }}
            ></div>
            <!-- целевая зона min→max: зелёный (показано до текущего значения, но не дальше max) -->
            <div
              class="absolute inset-y-0 bg-success"
              style=${{ left: `${greenL}%`, width: `${greenW}%` }}
            ></div>
            <!-- хвост сверх max: красный — visually torchsticking за зону -->
            ${redW > 0 &&
            html`
              <div
                class="absolute inset-y-0 bg-red-400"
                style=${{ left: `${redL}%`, width: `${redW}%` }}
              ></div>
            `}
            <!-- Тонкая отсечка справа от целевой зоны (max-граница) — визуальный якорь -->
            ${safeMax > 0 &&
            html`
              <div
                class="absolute inset-y-0 w-px bg-white/15"
                style=${{ left: `${pct(safeMax)}%` }}
              ></div>
            `}
          </div>
        `
      }

      // Двойное кольцо для группы:
      //   ВНУТРЕННЕЕ (меньший радиус) — "целевая зона". Заполняется от 0 до max,
      //     цвет: оранжевый при недогрузе, зелёный при оптимуме/перегрузе.
      //   ВНЕШНЕЕ (больший радиус) — появляется только при перегрузе.
      //     Заполняется в красном тоне на величину overshoot. Чем дальше за max,
      //     тем длиннее красная дуга вокруг.
      // Этот паттерн читается как "цель закрыта, и вот столько лишнего сверх".
      function GroupRing({ sets, min, max, size = 64 }) {
        const innerR = size / 2 - 11
        const outerR = size / 2 - 4
        const cx = size / 2
        const cy = size / 2
        const innerCirc = 2 * Math.PI * innerR
        const outerCirc = 2 * Math.PI * outerR

        // Внутреннее кольцо: прогресс к max (capped)
        const innerProgress = max > 0 ? Math.min(sets, max) / max : 0
        const innerFillLen = innerCirc * innerProgress

        const isOverload = sets > max && max > 0
        // Внешнее кольцо: насколько сверх max. Шкала — ещё один полный max сверху.
        const overshoot = Math.max(0, sets - max)
        const outerProgress = max > 0 ? Math.min(1, overshoot / max) : 0
        const outerFillLen = outerCirc * outerProgress

        // Цвет внутреннего кольца
        const innerStatus = sets === 0 ? 'none' : sets < min ? 'low' : 'optimal'
        const innerColor = {
          none: '#3a3a48',
          low: '#FB923C',
          optimal: '#34D399',
        }[innerStatus]
        const counterColor = isOverload ? '#F87171' : innerColor

        return html`
          <div class="relative flex-shrink-0" style=${{ width: `${size}px`, height: `${size}px` }}>
            <svg width=${size} height=${size} style=${{ transform: 'rotate(-90deg)' }}>
              <!-- Внешнее кольцо — фон + красная дуга (только если overload) -->
              ${isOverload &&
              html`
                <circle
                  cx=${cx}
                  cy=${cy}
                  r=${outerR}
                  stroke="rgba(248,113,113,0.12)"
                  stroke-width="3"
                  fill="none"
                />
                <circle
                  cx=${cx}
                  cy=${cy}
                  r=${outerR}
                  stroke="#F87171"
                  stroke-width="3"
                  fill="none"
                  stroke-linecap="round"
                  stroke-dasharray=${`${outerFillLen} ${outerCirc}`}
                />
              `}
              <!-- Внутреннее кольцо: трек -->
              <circle
                cx=${cx}
                cy=${cy}
                r=${innerR}
                stroke="#22222E"
                stroke-width="5"
                fill="none"
              />
              <!-- Внутреннее кольцо: заполнение -->
              ${sets > 0 &&
              html`
                <circle
                  cx=${cx}
                  cy=${cy}
                  r=${innerR}
                  stroke=${innerColor}
                  stroke-width="5"
                  fill="none"
                  stroke-linecap="round"
                  stroke-dasharray=${`${innerFillLen} ${innerCirc}`}
                />
              `}
              <!-- Тонкая отсечка на min внутреннего кольца -->
              ${min > 0 &&
              max > 0 &&
              html`
                <circle
                  cx=${cx}
                  cy=${cy}
                  r=${innerR}
                  stroke="rgba(255,255,255,0.4)"
                  stroke-width="5"
                  fill="none"
                  stroke-dasharray=${`1 ${innerCirc - 1}`}
                  stroke-dashoffset=${`-${innerCirc * (min / max) - 0.5}`}
                />
              `}
            </svg>
            <div class="absolute inset-0 flex items-center justify-center">
              <div
                class="text-xl font-bold tabular-nums leading-none"
                style=${{ color: counterColor }}
              >
                ${sets}
              </div>
            </div>
          </div>
        `
      }

      // Статус-чип для группы. Учитывает не только итог по группе,
      // но и состояние подмышц: если общий итог optimal, но какая-то
      // подмышца перегружена / недогружена — отдаём это в чип.
      function computeGroupChip(g) {
        if (g.status === 'overload')
          return { tone: 'red', label: `Перебор +${g.total - g.max}` }
        if (g.status === 'over')
          return { tone: 'yellow', label: `Чуть выше +${g.total - g.max}` }
        if (g.status === 'low')
          return { tone: 'orange', label: `Недогруз −${g.min - g.total}` }
        if (g.status === 'none') return { tone: 'grey', label: 'Не тренировал' }
        // group optimal — смотрим внутрь
        const overSubs = g.subs.filter(
          (s) => s.status === 'over' || s.status === 'overload',
        ).length
        const lowSubs = g.subs.filter(
          (s) => s.status === 'low' || s.status === 'none',
        ).length
        if (overSubs > 0 && lowSubs > 0)
          return { tone: 'yellow', label: 'Оптимум · дисбаланс' }
        if (overSubs > 0)
          return { tone: 'yellow', label: 'Оптимум · перегруз внутри' }
        if (lowSubs > 0)
          return { tone: 'orange', label: 'Оптимум · не все мышцы' }
        return { tone: 'green', label: '✓ Всё в норме' }
      }

      const CHIP_TONES = {
        red: 'bg-red-400/15 text-red-400',
        yellow: 'bg-yellow-400/15 text-yellow-400',
        orange: 'bg-orange-400/15 text-orange-400',
        green: 'bg-success/15 text-success',
        grey: 'bg-white/10 text-muted',
      }

      // Точечная лесенка для подмышц: каждый подход = одна точка.
      // Min/max обрамлены тонкими вертикальными отсечками.
      // До min — серый, в зоне — зелёный, выше max — красный.
      // При большом overload (>max+8) последние подходы сжимаются в "+N".
      function DotLadder({ sets, min, max }) {
        const safeSets = Math.max(0, sets || 0)
        const safeMin = Math.max(0, min || 0)
        const safeMax = Math.max(safeMin, max || 0)
        const visualMax = Math.min(Math.max(safeSets, safeMax), safeMax + 8)
        const overflow = safeSets > visualMax ? safeSets - visualMax : 0

        const dots = []
        for (let i = 1; i <= Math.max(visualMax, safeMax); i++) {
          let cls
          if (i > safeSets) cls = 'bg-cardAlt'
          else if (i < safeMin) cls = 'bg-white/30'
          else if (i <= safeMax) cls = 'bg-success'
          else cls = 'bg-red-400'
          dots.push({ idx: i, cls })
        }

        return html`
          <div class="flex items-center gap-[3px] flex-wrap">
            ${dots.map(
              (d) => html`
                <div key=${d.idx} class="flex items-center">
                  ${d.idx === safeMin && safeMin > 0 &&
                  html`<div class="h-2.5 w-px bg-white/40 mr-[3px]"></div>`}
                  <div class=${`w-1.5 h-1.5 rounded-full ${d.cls}`}></div>
                  ${d.idx === safeMax && safeMax > 0 &&
                  html`<div class="h-2.5 w-px bg-white/40 ml-[3px]"></div>`}
                </div>
              `,
            )}
            ${overflow > 0 &&
            html`<div class="text-[10px] text-red-400 ml-1 font-semibold">+${overflow}</div>`}
          </div>
        `
      }

      // Карточка мышечной группы: эмодзи + название + цель/чип + кольцо справа,
      // ниже — список подмышц с точечными лесенками.
      function MuscleGroupCard({ g }) {
        const chip = computeGroupChip(g)
        const chipCls = CHIP_TONES[chip.tone] || CHIP_TONES.grey

        return html`
          <div
            class="flex-shrink-0 rounded-3xl bg-card border border-border p-4"
            style=${{ width: '280px', scrollSnapAlign: 'center' }}
          >
            <!-- Header: emoji + name + target + chip + ring -->
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0 flex-1">
                <div class="flex items-center gap-2">
                  <span class="text-xl">${g.emoji}</span>
                  <div class="text-base font-semibold truncate">${g.label}</div>
                </div>
                <div class="text-[11px] text-muted mt-1">
                  Цель: ${g.min}–${g.max} подх./нед
                </div>
                <div
                  class=${`inline-flex items-center mt-2 px-2.5 py-1 rounded-full text-[11px] font-medium ${chipCls}`}
                >
                  ${chip.label}
                </div>
              </div>
              <${GroupRing} sets=${g.total} min=${g.min} max=${g.max} size=${64} />
            </div>

            <!-- Divider -->
            <div class="h-px bg-white/5 my-4"></div>

            <!-- Sub-muscles -->
            <div class="space-y-3">
              ${g.subs.map((sub) => html`<${SubMuscleRow} key=${sub.key} sub=${sub} />`)}
            </div>
          </div>
        `
      }

      // Строка одной подмышцы: подпись и счётчик сверху, точечная лесенка снизу
      function SubMuscleRow({ sub }) {
        const c = MUSCLE_COLORS[sub.status] || MUSCLE_COLORS.optimal
        return html`
          <div>
            <div class="flex items-center justify-between gap-2">
              <span class="text-[12px] truncate">${sub.label}</span>
              <div class="flex items-baseline gap-1 flex-shrink-0">
                <span class=${`text-[13px] font-semibold tabular-nums ${c.text}`}>${sub.sets}</span>
                <span class="text-[10px] text-subtle">/${sub.min}–${sub.max}</span>
              </div>
            </div>
            <div class="mt-1.5">
              <${DotLadder} sets=${sub.sets} min=${sub.min} max=${sub.max} />
            </div>
          </div>
        `
      }

      function BottomNav({ active, onChange }) {
        const items = [
          { key: 'home', label: 'Программа', icon: 'dumbbell' },
          { key: 'progress', label: 'Прогресс', icon: 'trendingUp' },
          { key: 'library', label: 'Библиотека', icon: 'book' },
          { key: 'profile', label: 'Профиль', icon: 'user' },
        ]
        return html`
          <div
            class="absolute bottom-0 inset-x-0 border-t border-border px-4 pt-3 pb-6"
            style=${{
              background: 'linear-gradient(to top, #0F0F13 80%, rgba(15, 15, 19, 0.9))',
              backdropFilter: 'blur(16px)',
            }}
          >
            <div class="flex items-center justify-around">
              ${items.map(
                (it) => html`
                  <button
                    key=${it.key}
                    onClick=${() => onChange && onChange(it.key)}
                    class=${`flex flex-col items-center gap-1 active:scale-95 transition-transform ${active === it.key ? 'text-accent' : 'text-subtle'}`}
                  >
                    <${Icon} name=${it.icon} size=${22} />
                    <span class="text-[10px] tracking-wide">${it.label}</span>
                  </button>
                `,
              )}
            </div>
          </div>
        `
      }

      // ═══════════════════════════════════════════════════════════════
      // МОДАЛКА: ВЫБОР ДРУГОЙ ТРЕНИРОВКИ
      // ═══════════════════════════════════════════════════════════════

      function SwitchWorkoutModal({ onClose, onPick }) {
        const items = [
          { type: 'B', name: 'Тренировка B', subtitle: 'Спина, бицепс, ноги', recommended: true },
          { type: 'A', name: 'Тренировка A', subtitle: 'Грудь, плечи, трицепс' },
          { type: 'custom', name: 'Внеплановая', subtitle: 'Выбрать упражнения вручную' },
        ]
        return html`
          <div
            class="absolute inset-0 z-30 flex items-end justify-center"
            style=${{ background: 'rgba(0, 0, 0, 0.5)', backdropFilter: 'blur(8px)' }}
            onClick=${onClose}
          >
            <div
              class="bg-card border border-border rounded-t-3xl p-5 w-full mx-0 fade-up"
              onClick=${(e) => e.stopPropagation()}
            >
              <div class="w-12 h-1 bg-cardAlt rounded-full mx-auto mb-5"></div>
              <div class="text-sm font-semibold mb-1">Какую тренировку сделать?</div>
              <div class="text-xs text-muted mb-4">Чередование автоматическое, но можешь выбрать</div>
              <div class="space-y-2">
                ${items.map(
                  (it) => html`
                    <button
                      key=${it.type}
                      onClick=${() => onPick(it.type)}
                      class=${`w-full flex items-center gap-3 p-3 rounded-2xl border ${
                        it.recommended
                          ? 'bg-accent/10 border-accent/30'
                          : 'bg-cardAlt border-border'
                      }`}
                    >
                      <div
                        class=${`w-10 h-10 rounded-full flex items-center justify-center ${
                          it.recommended ? 'bg-accent/20 text-accent' : 'bg-card text-muted'
                        }`}
                      >
                        <${Icon} name="dumbbell" size=${18} />
                      </div>
                      <div class="flex-1 text-left">
                        <div class="text-sm font-medium">${it.name}</div>
                        <div class="text-xs text-muted">${it.subtitle}</div>
                      </div>
                      ${it.recommended &&
                      html`<div class="text-[10px] text-accent uppercase tracking-wider">
                        по плану
                      </div>`}
                    </button>
                  `,
                )}
              </div>
              <button
                onClick=${onClose}
                class="mt-3 w-full h-11 rounded-xl text-sm text-muted"
              >
                Отмена
              </button>
            </div>
          </div>
        `
      }

      // ═══════════════════════════════════════════════════════════════
      // ROOT
      // ═══════════════════════════════════════════════════════════════

      function App() {
        // home | workout | summary | progress | library | profile
        const [screen, setScreen] = useState('home')
        const [switchModal, setSwitchModal] = useState(false)

        const handleNav = (key) => {
          if (key === 'home' || key === 'progress') {
            setScreen(key)
          } else {
            // Library и Profile — пока заглушки
            alert(`Экран "${key}" пока не реализован в прототипе`)
          }
        }

        return html`
          ${screen === 'home' &&
          html`
            <${HomeScreen}
              onStartWorkout=${() => setScreen('workout')}
              onSwitchWorkout=${() => setSwitchModal(true)}
              onNav=${handleNav}
            />
          `}
          ${screen === 'workout' &&
          html`
            <${WorkoutScreen}
              onExit=${() => setScreen('home')}
              onComplete=${() => setScreen('summary')}
            />
          `}
          ${screen === 'summary' &&
          html`<${SummaryScreen} onHome=${() => setScreen('home')} />`}
          ${screen === 'progress' &&
          html`<${ProgressScreen} onNav=${handleNav} />`}
          ${switchModal &&
          html`
            <${SwitchWorkoutModal}
              onClose=${() => setSwitchModal(false)}
              onPick=${() => {
                setSwitchModal(false)
                setScreen('workout')
              }}
            />
          `}
        `
      }

      render(html`<${App} />`, document.getElementById('root'))
    </script>
  </body>
</html>
